name: CI/CD Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Robot Checkout lấy mã nguồn
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      # Bước 2: Cài đặt Java JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Bước 3: Build Maven - Phải trỏ vào thư mục con chứa pom.xml
      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: ./Ho_Nguyen_Dang_Khoi_DOCKER

      # Bước 4: Robot Docker Login (Sử dụng Secrets đã cài ở Bước 2 bài tập)
      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 5: Robot Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          # Context là thư mục gốc nơi chứa Dockerfile của bạn
          context: .
          # Chỉ định đường dẫn file Dockerfile (nếu robot vẫn không tự thấy)
          file: ./Dockerfile
          push: true
          # Đổi 'java-springboot-app' thành tên bạn muốn hiển thị trên Docker Hub
          tags: ${{ secrets.DOCKER_USERNAME }}/java-springboot-app:latest
      - name: Triển khai lên DevOps Classroom
        run: |
          # 1. Khai báo thông tin chính xác
          REPO="hndk17/java-springboot-app"
          
          # Cập nhật PORT từ 80 thành 8082 (khớp với container bạn đang chạy)
          CONTAINER_PORT=8082 
          
          echo "Bắt đầu gọi Webhook deploy cho $REPO tại slot 3..."

          # 2. Gọi Webhook với tham số --max-time để tránh bị ngắt kết nối giữa chừng (lỗi 524)
          # Thêm --connect-timeout 10 và --max-time 180 (chờ tối đa 3 phút)
          RESPONSE=$(curl -sS --connect-timeout 10 --max-time 180 \
            -w "\n%{http_code}" \
            -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=3&container_port=$CONTAINER_PORT&strict_container_port=0")

          # 3. Tách lấy Body và HTTP Code
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "Webhook HTTP Response Code: $CODE"

          # 4. Kiểm tra điều kiện lỗi
          if [ "$CODE" -eq 524 ]; then
            echo "--------------------------------------------------------"
            echo "CẢNH BÁO: Gặp lỗi Timeout 524 từ Cloudflare."
            echo "Lệnh deploy đã được gửi đi nhưng server phản hồi quá lâu."
            echo "Vui lòng đợi 2-3 phút rồi kiểm tra lại địa chỉ web của bạn."
            echo "--------------------------------------------------------"
            # Cho phép Action báo Xanh vì thường server vẫn sẽ deploy thành công sau đó
            exit 0 
          elif [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại thực sự. Xem chi tiết bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi

          # 5. Thông báo thành công
          echo "Deploy thành công!"
          echo "::group::Chi tiết phản hồi từ Server"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
