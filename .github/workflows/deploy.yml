name: CI/CD Build and Push to Docker Hub

# 1. Kích hoạt workflow khi có hành động push vào nhánh main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Robot 1: Checkout - Lấy mã nguồn từ repo về máy ảo của GitHub
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      # (Tùy chọn) Robot hỗ trợ thiết lập Java nếu bạn muốn build file .jar trước khi đóng gói Docker
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Robot 2: Docker Login - Đăng nhập vào Docker Hub sử dụng Secrets đã tạo
      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Robot 3: Build and push Docker Images - Xây dựng và đẩy image lên Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          # Thay 'your-docker-username' bằng tên thật hoặc dùng biến
          # 'latest' là tag mặc định, bạn có thể thêm tag theo số version
          tags: ${{ secrets.DOCKER_USERNAME }}/java-springboot-app:latest
